[build]
  command = "corepack enable && corepack prepare pnpm@10.11.0 --activate && pnpm install --no-frozen-lockfile && cd artifacts/flowdesk && pnpm run build"
  publish = "artifacts/flowdesk/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  PNPM_VERSION = "10"
  NETLIFY = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200